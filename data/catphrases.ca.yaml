- "Hi ha gats que esperen una llar. Potser avui un trobarà la teva."
- "Les millors històries comencen amb un simple «miau»."
- "Tots tenen un passat. Tots mereixen un futur."
- "No busquis el gat perfecte. Busca el que et robi el cor."
- "Alguns arriben per quedar-se... i canviar-te la vida."
- "El proper ronc que escoltis podria ser per a tu."
- "Ells no busquen una casa. Busquen una família."
- "Cada gat té una història. Tu en pots escriure el següent capítol."
- "Adoptar salva dues vides: la seva... i una mica la teva també."
- "Potser aquest és el company que fa temps que estaves buscant."