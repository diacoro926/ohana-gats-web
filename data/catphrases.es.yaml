- "Hay gatos que esperan un hogar. Quizá hoy uno encuentre el tuyo."
- "Las mejores historias empiezan con un simple «miau»."
- "Todos tienen un pasado. Todos merecen un futuro."
- "No busques un gato perfecto. Busca uno que te robe el corazón."
- "Algunos llegan para quedarse... y cambiarte la vida."
- "El próximo ronroneo que escuches podría ser para ti."
- "Ellos no buscan una casa. Buscan una familia."
- "Cada gato tiene una historia. Tú puedes escribir el siguiente capítulo."
- "Adoptar salva dos vidas: la suya... y un poquito la tuya también."
- "Quizá este sea el compañero que llevabas tiempo buscando."