{{ define "main" }}
  <div role="main" class="container">
    <div class="row">
      <div class="col-lg-8 col-lg-offset-2 col-md-10 col-md-offset-1 text-center">

        <!-- Always take title and subtitle from front matter -->
        <h1>{{ .Title }}</h1>
        {{ with .Params.subtitle }}
          <p class="text-muted">{{ . }}</p>
        {{ end }}

        <!-- Print the body markdown if it exists -->
        {{ with .Content }}
          <div class="content-box text-left mt-4">
            {{ . }}
          </div>
        {{ end }}

      </div>
    </div>
  </div>
{{ end }}
