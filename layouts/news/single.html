{{ define "main" }}
<div role="main" class="container">

  <div class="row">
    <div class="col-lg-12 col-md-12 text-center">

      <!-- Title and subtitle outside the box -->
      <h1>{{ .Title }}</h1>
      {{ with .Params.subtitle }}
        <p class="text-muted">{{ . }}</p>
      {{ end }}

      <!-- Main content inside the box -->
      {{ with .Content }}
        <div class="content-box text-left mt-4 p-3 shadow-sm rounded">
          {{ . }}
        </div>
      {{ end }}

    </div>
  </div>

</div>
      <!-- Navigation Arrows -->
<div class="cat-detail-nav mt-4 d-flex justify-content-between align-items-center">
  {{ with .PrevInSection }}
    <a class="btn nav-btn" href="{{ .RelPermalink }}" title="{{ i18n "previousCat" }}">&larr;</a>
  {{ else }}
    <span></span>
  {{ end }}

  <a class="btn nav-btn back-btn mx-3" href="{{ .Parent.RelPermalink }}" title="{{ i18n "backToList" }}">&uarr;</a>

  {{ with .NextInSection }}
    <a class="btn nav-btn" href="{{ .RelPermalink }}" title="{{ i18n "nextCat" }}">&rarr;</a>
  {{ else }}
    <span></span>
  {{ end }}
</div>

      </div>
    </div>
  </div>

</div>
{{ end }}
