<style>

/* === Global background and text === */

html, body {
  background-color: #f5daee !important;
  color: #2b2b2b;
  padding-top: 100px;
  font-family: 'Franklin Gothic Medium', sans-serif !important;
  line-height: 1.6;
}

/* Section spacing */

.section-gap {
  margin-top: 4rem;
  margin-bottom: 4rem;
}

/* Headings and paragraphs */

p, h1, h2, h3, h4, h5, h6 {
  color: #2b2b2b !important;
  margin-bottom: 1rem;
}

/* === Markdown list fixes === */

.content-wrapper ul,
.content-wrapper ol {
  padding-left: 1.4rem;
  margin-bottom: 1rem;
  list-style-position: outside;
}

.content-wrapper li {
  margin-bottom: 0.35rem;
}

/* === Header & Footer === */

.navbar,
footer {
  background-color: #E6E6FA !important;
  color: #fbbe6a;
}

.navbar a,
footer a {
  color: #2a292f !important;
}

footer {
  padding: 20px 0;
  font-size: 0.9rem;
}

/* === Content area === */

.content-wrapper {
  padding: 20px;
}

.content-box {
  background-color: #ffffff;
  padding: 19px;
  border-radius: 8px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  margin-bottom: 15px;
  border: 2px solid #b14c75;
}

/* === Buttons === */

.btn,
button,
input[type="submit"] {
  background-color: #91b9f4;
  border: none;
  color: #fff !important;
  font-weight: 600;
  padding: 0.5rem 1.25rem;
  border-radius: 6px;
  transition: background-color 0.3s ease;
}

.btn:hover,
button:hover,
input[type="submit"]:hover {
  background-color: #f1c4ea;
}

/* === Cat grid styles === */

.cat-card {
  margin-bottom: 2.5rem;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;

  background-color: #fff;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);

  padding: 15px;
  height: 260px;

  transition: transform 0.2s ease;
  text-align: center;
}

.cat-card:hover {
  transform: translateY(-5px);
}

/* Cat image */

.cat-img {
  width: 100px;
  height: 100px;
  object-fit: cover;
  border-radius: 50%;
  border: 3px solid #374a78;
  margin-bottom: 0.75rem;
}

/* Cat text */

.cat-name {
  font-size: 1.2rem;
  font-weight: 700;
  margin-bottom: 0.25rem;
  color: #2b2b2b;
}

.cat-meta {
  font-size: 0.9rem;
  color: #555;
  margin: 0;
}

/* === Cat detail page === */

.cat-detail-card {
  padding: 30px;
  position: relative;
}

.cat-detail-img {
  max-width: 300px;
  width: 100%;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}

.cat-detail-name,
.cat-detail-meta,
.cat-detail-summary,
.cat-detail-content {
  font-size: inherit;
}

/* === Cat markdown sections === */

.cat-detail-content h3 {
  margin-top: 2rem;
  margin-bottom: 0.6rem;
  font-weight: 700;
}

/* Navigation buttons */

.cat-detail-nav {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 1rem;
  margin-top: 1.5rem;
}

.cat-detail-nav .nav-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;

  min-width: 45px;
  min-height: 45px;

  font-size: 1.2rem;
  font-weight: bold;

  border-radius: 50%;
  border: 2px solid #e98a65;

  background-color: #fff;
  color: #e98a65 !important;

  transition: all 0.3s ease;
}

.cat-detail-nav .nav-btn:hover {
  background-color: #e98a65;
  color: #fff !important;
}

.cat-detail-nav .back-btn {
  border-color: #87a8c4;
  color: #87a8c4 !important;
}

.cat-detail-nav .back-btn:hover {
  background-color: #87a8c4;
  color: #fff !important;
}

/* Overlay text */

.overlay-title {
  font-size: 1.25rem;
  font-weight: bold;
  margin-bottom: 0.25rem;
}

.overlay-subtitle {
  font-size: 1rem;
  margin-bottom: 0.5rem;
}

.overlay .btn {
  background-color: #ffffff;
  color: #e98a65 !important;
  font-size: 0.9rem;
  padding: 0.35rem 0.9rem;
  border-radius: 4px;
}

.overlay .btn:hover {
  background-color: #f9f9f9;
}

/* === Adopted watermark === */

.cat-card,
.cat-detail-card {
  position: relative;
}

.adopted-watermark {
  position: absolute;
  top: 50%;
  left: 50%;

  transform: translate(-50%, -50%) rotate(-20deg);

  font-size: 2.2rem;
  font-weight: 900;

  color: rgba(177, 76, 117, 0.70);

  text-transform: uppercase;
  white-space: nowrap;

  pointer-events: none;
  z-index: 10;
}

.cat-detail-card .adopted-watermark,
.adopted-detail {
  font-size: 4rem;
  color: rgba(177, 76, 117, 0.70);
}

/* === Contact form === */

.contact-form {
  display: flex;
  flex-direction: column;
  gap: 1rem;

  max-width: 500px;
  margin: 0 auto;
}

.contact-form label {
  font-weight: 600;
  color: #2b2b2b;
  text-align: left;
}

.contact-form input,
.contact-form textarea {
  width: 100%;
  padding: 10px;

  border-radius: 6px;
  border: 1px solid #ccc;

  font-family: inherit;
  font-size: 1rem;
}

.contact-form input:focus,
.contact-form textarea:focus {
  outline: none;
  border-color: #e98a65;
  box-shadow: 0 0 0 2px rgba(233,138,101,0.2);
}

.contact-form button {
  align-self: flex-start;
}

/* Links */

.my-link {
  color: #2b2b2b;
  text-decoration: none;
}

.my-link:hover {
  color: #000000;
}

/* === Market products grid === */

.products-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
  align-items: start;
}

@media (min-width: 700px) {
  .products-grid {
    grid-template-columns: 1fr 1fr;
  }
}

.product-item {
  display: flex;
  align-items: center;
  gap: 16px;
}

.product-item img {
  width: 200px;
  flex-shrink: 0;
}

/* === Responsive adjustments === */

@media (max-width: 991px) {

  body {
    padding-top: 80px;
  }

}

@media (max-width: 575px) {

  body {
    padding-top: 70px;
  }

  h1 {
    font-size: 1.75rem;
  }

  h3 {
    font-size: 1.2rem;
  }

  p {
    font-size: 0.95rem;
  }

  /* Mobile markdown list fix */

  .content-wrapper ul,
  .content-wrapper ol {
    padding-left: 1.1rem;
  }

  .content-wrapper li {
    line-height: 1.45;
  }

  /* Mobile cat section blocks */

  .cat-detail-content h3 {
    background: #ffffff;
    padding: 8px 12px;
    border-radius: 8px;
    border-left: 4px solid #e98a65;
    font-size: 1.1rem;
  }

  .cat-detail-content ul,
  .cat-detail-content p {
    margin-left: 6px;
  }

  .adopted-watermark {
    font-size: 1.8rem;
  }

  .cat-detail-card .adopted-watermark,
  .adopted-detail {
    font-size: 2.6rem;
  }

}

@media (max-width: 500px) {

  .product-item {
    flex-direction: column;
    align-items: flex-start;
  }

  .product-item img {
    width: 100%;
    max-width: 220px;
  }

}

</style>
